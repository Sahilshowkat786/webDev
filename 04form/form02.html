<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <h1>University Registration Form</h1>
        <p>Please fill out the form below to register.</p>
        <hr>
        <h2>personal Details</h2>
        <form>
            <label for="name">First Name:</label>
            <input type="text"name="name"id="name" placeholder="eg.sahil" required>
            <br><br>
             <label>Last Name:</label>
            <input type="text" placeholder="eg.showkat">
            <br><br>
            <label>Date of Brith:</label>
            <input type="date">
            <br>
            <h3>Gender:</h3>
            <label for="Male">Male</label>
            <input type="radio" name="gendername" id="male" value="male">
            <br>
            <label for="female">female</label>
            <input type="radio" name="gendername" id="female" value="female">
            <br>
            <label for="other">Other</label>
            <input type="radio" name="gendername" id="other" value="other">
            <br>
            <br>
            <h3>Upload you photo:</h3>
            <input type="file">
            <hr >
            <h2>Contact Information</h2>
            <label for="email">Email Address</label>
            <input type="email" name="email" id="email" placeholder="you@gmail.com">
            <br><br>
            <label for="phno">Phone Number</label>
            <input type="tel" name="phno" id="phno" placeholder="eg.9622346709">
            <br><br>
            <label for="adress">Mailing Address</label>
            <br>
            <textarea name="adress" id="adress" rows="5" cols="20"></textarea>
            <hr>
            <h3>Academic information</h3>
            <label>Select Your Course</label>
            <select name="course" id="course">
                <option value="CSE">CSE</option>
                <option value="AI">AI</option>
                <option value="CE">CIV</option>


            </select>
<br>
<h3>Extracurricular Activities</h3>
<label for="sports">Sports</label>
<input type="checkbox" name="interest" id="sports" value="sports">
<br><br>
<label for="music">music</label>
<input type="checkbox" name="interest" id="music" value="music" >
<br><br>
<label for="technology">technology</label>
<input type="checkbox" name="interest" id="technology" value="technology">
<br><br>
<hr>
<h3>Create Your Account</h3>
            <label>Create a password:</label>
            <input type="password">
            <br><br>
            <label for="security">Security Question:</label>
            <select>
                <option>what was your first pet's name?</option>
                <option>what is your gf's name?</option>
                <option>what is your favourite book</option>
                
            </select>
            <br><br>
            <label>Security Answer:</label>
            <input type="text">
            <br><br>
            <input type="checkbox"> I agree to the Terms and conditions.
            <hr>
            <button type="submit">Register</button>
            <input type="submit" value="register">
            <button type="reset">Clear form</button>


        </form>
        


    
</body>
</html>
