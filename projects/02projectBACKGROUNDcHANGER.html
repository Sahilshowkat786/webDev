<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>background changer</title>
    <!-- css code -->
    <style>
      h1{
        color:wheat;
      }
      button {
        cursor: pointer;
        padding: 10px;
        font-weight: bold;
        background-color: rgb(171, 180, 122);
        border: 2px solid black;
        border-radius: 10px;
        height: 50px;
        width: 100px;
      }
    </style>
  </head>
  <body>
    <!-- html code -->
    <h1>Change our Background color</h1>
    <div id="parent">
      <button id="red" style="background-color: red">Red</button>
      <button id="blue" style="background-color: blue">Blue</button>
      <button id="orange" style="background-color: orange">Orange</button>
      <button id="pink" style="background-color: pink">Pink</button>
      <button id="green" style="background-color: green">green</button>
    </div>
    <!-- java script code -->
    <script>
      // search element
      const parent = document.getElementById("parent");
      const body = document.querySelector("body");
      // event handler
      parent.addEventListener("click", (e) => {
        const child = e.target;
        body.style.backgroundColor = child.id;
      });
    </script>
  </body>
</html>
