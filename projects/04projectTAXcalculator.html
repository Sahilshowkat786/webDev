<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>income tex calculaator</title>
    <!-- css -->
    <style></style>
  </head>
  <body>
    <div id="parent">
      <h1>Income Tex calculator</h1>
      <form>
        <label for="income">Income</label>
        <input type="number" id="income" name="income" />
        <br /><br />
        <button>calculate income</button>
      </form>
      <h2>Total tax:</h2>
    </div>
    
    <!-- js code  -->
    <script>
      const form = document.querySelector("form");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const income = document.querySelector("#income");
        const amount = parseInt(income.value);

        const result = document.querySelector("h2");
        let totaltax = 0;

        if (amount <= 1200000) {
          toraltax = 0;
        } else if (amount < 1600000) {
          totaltax = (amount - 1200000) * 0.15;
        } else if (amount < 2000000) {
          totaltax = (amount - 1600000) * 0.2 + 60000;
        } else if (amount < 2400000) {
          totaltax = (amount - 2000000) * 0.25 + 60000 + 80000;
        } else {
          totaltax = (amount - 2400000) * 0.3 + 60000 + 80000 + 100000;
        }

        result.textContent = `Total tax:${totaltax}`;
        form.reset();
      });
    </script>
  </body>
</html>
