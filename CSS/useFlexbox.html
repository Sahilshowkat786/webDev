<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>using flexbox </title>
    <style>
    *{
    padding:0px;
    margin:0px;

    }
.container{
    display:flex;
    padding:5px;
    gap:5px;
    background-color:aqua;
}
 .box{      /* it works for both boxes 1 and 2 */
    height:300px;
    width:200px;
  

    
}
.first{
    background-color:red;

}

.second{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.child{
    height:140px;
    background-color:green;
}

    </style>



</head>
<body>
    <div class="container">
        <div class="box first">first</div>
        <div class="box second">
        <div class="child">child1</div>
        <div class="child">child2</div>
        </div>
    </div>
    
</body>
</html>
