<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>learning about transitions</title>
    <style>
        *{
            padding:0;
            margin:0;
            box-sizing:border-box;
        }
        .container{
            height:100vh;
            background-color:black;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .box{
            height:150px;
            width:150px;
            background-color:orange;
            cursor:pointer;
            /* transition-property: background-color; */
            transition-property:all;
            transition-duration:3s;
            transition-timing-function:linear;
            transition-delay:1s;

            /* shorthand property of transition */
            transition: all 3s ease-in 2s;
        }

        .box:hover{
            background-color:blue;
            width:300px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
