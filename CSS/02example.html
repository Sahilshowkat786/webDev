<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media queries</title>
    <style>
*{ 
    padding:0;
    margin:0px;
    box-sizing:border-box;
}
body{
    background-color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    height:200px;
    width:800px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:1fr;
    gap:5px;
    
}
img{
    background-color:orange;
    height:100%;
    width:100%;
}

@media screen and (max-width:900px){
    .container{
    height:400px;
    width:400px;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr,1fr;
    gap:5px;

    }
}

@media screen and (max-width:500px){
    .container{
    height:800px;
    width:200px;
    display:grid;
    grid-template-columns:1fr;
    grid-template-rows:1fr 1fr 1fr;
    gap:5px;

    }
}

    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img src="./sahil.jpg" alt="sahil's image">
        </div>
          <div class="box">
            <img src="./sahil.jpg" alt="sahil's image">
        </div>
          <div class="box">
            <img src="./sahil.jpg" alt="sahil's image">
        </div>
          <div class="box">
            <img src="./sahil.jpg" alt="sahil's image">
        </div>
    </div>
</body>
</html>
