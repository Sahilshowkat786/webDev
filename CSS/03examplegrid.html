<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>about grid</title>
    <style>
*{
    padding:0px;
    margin:0px;
    box-sizing:border-box;
}
body{
    background-color:black;
    color:white;
}
.container{
    display:grid;
    height:800px;
    width:800px;
    grid-template-columns: repeat(3,1fr);
    grid-template-rows: 1fr 2fr 2fr 1fr;
    gap:10px;
    padding:10px;


}
.box{
    background-color:rgb(118, 118, 219);

}
.header{
    grid-column-start:1;
    grid-column-end:4;

}

.Sidebar{
    grid-row-start:2;
    grid-row-end:4;


}
.content1{
    grid-column:2/4;
    
}
.footer{
    grid-column:1/4;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="box header">Header</div>
        <div class="box Sidebar">sidebar</div>
        <div class="box content1">content1</div>
        <div class="box content2">content2</div>
        <div class="box content3">content3</div>
        <div class="box footer">footer</div>

    </div>
</body>
</html>
