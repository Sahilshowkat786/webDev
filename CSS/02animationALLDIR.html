<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>learn about animation</title>
    <style>
        *{
            padding:0px;
            margin:0px;
            box-sizing:border-box;
             background-color:black;
        }
        .container{
           padding:20px;
           position:relative;
        }
        .box{
            height:100px;
            width:150px;
            background-color:red;
            animation-name:moving;
            animation-duration:5s;
            animation-iteration-count:infinite;
            animation-timing-function:linear;
            animation-delay:2s;
            position:absolute;

        }
        @keyframes moving{
            0%{
                background-color:orange;
                top:10px;
                left:10px;
            }
            25%{
                background-color:blue;
                top:10px;
                left:800px;
            }
            50%{
                background-color:rgb(0, 255, 145);
                top:500px;
                left:800px;
            }
            75%{
                background-color:blue;
                top:500px;
                left:10px;
        }
        100%{
                background-color:orange;
                top:10px;
                left:10px;
    }
}

    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
    
</body>
</html>
