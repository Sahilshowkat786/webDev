<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box shadow</title>
    <style>
        body{
            background-color:black;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;

        }
        .container{
            background-color:orange;
            height:200px;
            width:200px;
            box-shadow:10px 10px 8px 3px blue;
            /* offset-x ,offset-y ,blur-radius ,spread-rad */
            
            /* box-shadow:inset 10px 10px blue; */
        }

    </style>
</head>
<body>
    <div class="container"></div>
    
</body>
</html>
